name: Daily AI-OR Paper Report

on:
  schedule:
    # 北京时间每天早上 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动运行

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests openai

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }} # 如果有代理地址则填，没有可不填
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }} # 您的网易邮箱授权码
        run: python hf_paper_bot.py
